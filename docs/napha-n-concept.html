<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Napha N — Chart Style</title>
  <style>
    body { background: #131722; font-family: sans-serif; padding: 40px; display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
    .card { background: #1e222d; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    svg { border-radius: 22%; display: block; margin: 0 auto; }
    h3 { margin: 14px 0 4px; font-size: 14px; color: #ccc; }
    p  { margin: 0; font-size: 11px; color: #555; }
  </style>
</head>
<body>

<div class="card">
  <svg width="320" height="320" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

    <!-- Dark chart background -->
    <rect width="512" height="512" fill="#0D1B2A"/>

    <!-- Grid — horizontal -->
    <line x1="0" y1="130" x2="512" y2="130" stroke="#1E3A5F" stroke-width="1"/>
    <line x1="0" y1="230" x2="512" y2="230" stroke="#1E3A5F" stroke-width="1"/>
    <line x1="0" y1="330" x2="512" y2="330" stroke="#1E3A5F" stroke-width="1"/>
    <line x1="0" y1="430" x2="512" y2="430" stroke="#1E3A5F" stroke-width="1"/>
    <!-- Grid — vertical -->
    <line x1="128" y1="0" x2="128" y2="512" stroke="#1E3A5F" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#1E3A5F" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#1E3A5F" stroke-width="1"/>

    <!-- Gold finance watermarks — 5 cols × 4 rows, clipped above NAPHA text -->
    <!-- x cols: 51, 153, 256, 358, 460  |  y rows: 74, 172, 268, 364 -->
    <defs><clipPath id="noText"><rect x="0" y="0" width="512" height="452"/></clipPath></defs>
    <g clip-path="url(#noText)">
      <!-- ROW 1 -->
      <text x="51"  y="74"  font-size="22" text-anchor="middle" font-family="serif"      fill="#FFD700" opacity="0.18">₹</text>
      <text x="153" y="74"  font-size="20" text-anchor="middle" font-family="sans-serif" fill="#FFD700" opacity="0.14">%</text>
      <!-- candlestick @ 256 -->
      <line x1="256" y1="54" x2="256" y2="76" stroke="#FFD700" stroke-width="2" opacity="0.16"/>
      <rect x="252" y="58" width="8" height="12" fill="#FFD700" opacity="0.16" rx="1"/>
      <!-- trend line @ 358 -->
      <polyline points="344,72 352,64 360,67 370,60" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.15" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="460" y="74"  font-size="22" text-anchor="middle" font-family="serif"      fill="#FFD700" opacity="0.16">₹</text>

      <!-- ROW 2 -->
      <!-- bar chart @ 51 -->
      <rect x="42"  y="158" width="5" height="10" fill="#FFD700" opacity="0.15" rx="1"/>
      <rect x="50"  y="153" width="5" height="15" fill="#FFD700" opacity="0.15" rx="1"/>
      <rect x="58"  y="148" width="5" height="20" fill="#FFD700" opacity="0.15" rx="1"/>
      <text x="153" y="172" font-size="22" text-anchor="middle" font-family="serif"      fill="#FFD700" opacity="0.20">₹</text>
      <text x="256" y="172" font-size="20" text-anchor="middle" font-family="sans-serif" fill="#FFD700" opacity="0.14">▲</text>
      <!-- candlestick @ 358 -->
      <line x1="358" y1="150" x2="358" y2="175" stroke="#FFD700" stroke-width="2" opacity="0.17"/>
      <rect x="354" y="155" width="8" height="12" fill="#FFD700" opacity="0.17" rx="1"/>
      <text x="460" y="172" font-size="20" text-anchor="middle" font-family="sans-serif" fill="#FFD700" opacity="0.14">%</text>

      <!-- ROW 3 -->
      <!-- trend line @ 51 -->
      <polyline points="37,264 45,256 53,260 63,252" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.14" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="153" y="268" font-size="20" text-anchor="middle" font-family="sans-serif" fill="#FFD700" opacity="0.15">▲</text>
      <text x="256" y="268" font-size="22" text-anchor="middle" font-family="serif"      fill="#FFD700" opacity="0.20">₹</text>
      <!-- bar chart @ 358 -->
      <rect x="350" y="256" width="5" height="10" fill="#FFD700" opacity="0.15" rx="1"/>
      <rect x="358" y="251" width="5" height="15" fill="#FFD700" opacity="0.15" rx="1"/>
      <rect x="366" y="246" width="5" height="20" fill="#FFD700" opacity="0.15" rx="1"/>
      <!-- candlestick @ 460 -->
      <line x1="460" y1="248" x2="460" y2="273" stroke="#FFD700" stroke-width="2" opacity="0.15"/>
      <rect x="456" y="253" width="8" height="12" fill="#FFD700" opacity="0.15" rx="1"/>

      <!-- ROW 4 -->
      <text x="51"  y="364" font-size="20" text-anchor="middle" font-family="sans-serif" fill="#FFD700" opacity="0.14">%</text>
      <!-- candlestick @ 153 -->
      <line x1="153" y1="343" x2="153" y2="368" stroke="#FFD700" stroke-width="2" opacity="0.17"/>
      <rect x="149" y="348" width="8" height="12" fill="#FFD700" opacity="0.17" rx="1"/>
      <!-- trend line @ 256 -->
      <polyline points="244,362 252,354 260,358 270,350" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.14" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="358" y="364" font-size="22" text-anchor="middle" font-family="serif"      fill="#FFD700" opacity="0.18">₹</text>
      <text x="460" y="364" font-size="20" text-anchor="middle" font-family="sans-serif" fill="#FFD700" opacity="0.14">▲</text>
    </g>

    <!--
      N redesigned with nearly-vertical legs.
      Left leg:  x=90–152  (tight x-spread = nearly vertical)
      Diagonal:  x=164–348 (wide, forms the slant of N)
      Right leg: x=360–422 (tight x-spread = nearly vertical)
      All three segments same height: y=78–430
      Legs are symmetric around canvas centre x=256
    -->

    <!-- ═══ LEFT LEG — 8 candles, tight x (nearly vertical) ═══ -->
    <line x1="90"  y1="390" x2="90"  y2="430" stroke="#26a69a" stroke-width="2"/>
    <rect x="85"  y="398" width="10" height="24" fill="#26a69a" rx="1"/>

    <line x1="100" y1="352" x2="100" y2="398" stroke="#ef5350" stroke-width="2"/>
    <rect x="95"  y="360" width="10" height="28" fill="#ef5350" rx="1"/>

    <line x1="110" y1="304" x2="110" y2="358" stroke="#26a69a" stroke-width="2"/>
    <rect x="105" y="314" width="10" height="36" fill="#26a69a" rx="1"/>

    <line x1="120" y1="258" x2="120" y2="310" stroke="#26a69a" stroke-width="2"/>
    <rect x="115" y="268" width="10" height="34" fill="#26a69a" rx="1"/>

    <line x1="130" y1="228" x2="130" y2="268" stroke="#ef5350" stroke-width="2"/>
    <rect x="125" y="235" width="10" height="22" fill="#ef5350" rx="1"/>

    <line x1="140" y1="178" x2="140" y2="232" stroke="#26a69a" stroke-width="2"/>
    <rect x="135" y="188" width="10" height="36" fill="#26a69a" rx="1"/>

    <line x1="150" y1="128" x2="150" y2="182" stroke="#26a69a" stroke-width="2"/>
    <rect x="145" y="138" width="10" height="34" fill="#26a69a" rx="1"/>

    <!-- Peak — tall green, top of left leg -->
    <line x1="160" y1="72"  x2="160" y2="135" stroke="#26a69a" stroke-width="2.5"/>
    <rect x="154" y="82"  width="12" height="44" fill="#26a69a" rx="1"/>

    <!-- ═══ DIAGONAL — 10 candles falling from left-peak to right-valley ═══ -->
    <line x1="176" y1="72"  x2="176" y2="148" stroke="#ef5350" stroke-width="2.5"/>
    <rect x="171" y="83"  width="10" height="54" fill="#ef5350" rx="1"/>

    <line x1="194" y1="112" x2="194" y2="178" stroke="#ef5350" stroke-width="2"/>
    <rect x="189" y="122" width="10" height="44" fill="#ef5350" rx="1"/>

    <line x1="212" y1="148" x2="212" y2="208" stroke="#26a69a" stroke-width="2"/>
    <rect x="207" y="157" width="10" height="28" fill="#26a69a" rx="1"/>

    <line x1="230" y1="188" x2="230" y2="255" stroke="#ef5350" stroke-width="2"/>
    <rect x="225" y="198" width="10" height="46" fill="#ef5350" rx="1"/>

    <line x1="248" y1="232" x2="248" y2="292" stroke="#ef5350" stroke-width="2"/>
    <rect x="243" y="242" width="10" height="38" fill="#ef5350" rx="1"/>

    <line x1="266" y1="270" x2="266" y2="322" stroke="#26a69a" stroke-width="2"/>
    <rect x="261" y="278" width="10" height="30" fill="#26a69a" rx="1"/>

    <line x1="284" y1="302" x2="284" y2="368" stroke="#ef5350" stroke-width="2"/>
    <rect x="279" y="312" width="10" height="46" fill="#ef5350" rx="1"/>

    <line x1="302" y1="338" x2="302" y2="398" stroke="#ef5350" stroke-width="2"/>
    <rect x="297" y="348" width="10" height="40" fill="#ef5350" rx="1"/>

    <!-- Valley — tall red, bottom of diagonal -->
    <line x1="322" y1="368" x2="322" y2="435" stroke="#ef5350" stroke-width="2.5"/>
    <rect x="316" y="378" width="12" height="48" fill="#ef5350" rx="1"/>

    <!-- ═══ RIGHT LEG — 8 candles, tight x (nearly vertical) ═══ -->
    <!-- First green after valley — hammer candle -->
    <line x1="352" y1="365" x2="352" y2="435" stroke="#26a69a" stroke-width="2.5"/>
    <rect x="346" y="375" width="12" height="48" fill="#26a69a" rx="1"/>

    <line x1="362" y1="335" x2="362" y2="388" stroke="#ef5350" stroke-width="2"/>
    <rect x="357" y="343" width="10" height="32" fill="#ef5350" rx="1"/>

    <line x1="372" y1="285" x2="372" y2="338" stroke="#26a69a" stroke-width="2"/>
    <rect x="367" y="294" width="10" height="34" fill="#26a69a" rx="1"/>

    <line x1="382" y1="238" x2="382" y2="288" stroke="#26a69a" stroke-width="2"/>
    <rect x="377" y="247" width="10" height="32" fill="#26a69a" rx="1"/>

    <line x1="392" y1="208" x2="392" y2="248" stroke="#ef5350" stroke-width="2"/>
    <rect x="387" y="215" width="10" height="22" fill="#ef5350" rx="1"/>

    <line x1="402" y1="158" x2="402" y2="210" stroke="#26a69a" stroke-width="2"/>
    <rect x="397" y="167" width="10" height="34" fill="#26a69a" rx="1"/>

    <line x1="412" y1="110" x2="412" y2="162" stroke="#26a69a" stroke-width="2"/>
    <rect x="407" y="119" width="10" height="34" fill="#26a69a" rx="1"/>

    <!-- Peak — tall green, top of right leg, mirrors left peak -->
    <line x1="422" y1="72"  x2="422" y2="118" stroke="#26a69a" stroke-width="2.5"/>
    <rect x="416" y="82"  width="12" height="28" fill="#26a69a" rx="1"/>

    <!-- NAPHA -->
    <text x="256" y="490" font-size="50" text-anchor="middle" fill="white"
          font-family="Arial,sans-serif" font-weight="bold" letter-spacing="6">NAPHA</text>

  </svg>
  <h3>N — Real chart feel</h3>
  <p>30 candles · Touching · Varying sizes · TradingView palette</p>
</div>

</body>
</html>
